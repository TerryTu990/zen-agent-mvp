# 服务器侧 compose（/root/zen-agent/docker-compose.yml，由 deploy-server.sh 同步）。
# 端口只绑 127.0.0.1:9010——对外经 1panel 反代 https://agent.flash-api.com 进入，容器不直接暴露公网。
# secret 与环境参数全在同目录 .env（手工维护，不入仓）。
services:
  zen-agent:
    image: zen-agent-server:${ZA_IMAGE_TAG:-latest}
    ports:
      - '127.0.0.1:9010:8787'
    env_file:
      - .env
    environment:
      ZA_SNAPSHOT_ROOT: /app/snapshot
    volumes:
      # 站点包快照（只读）：换站点配置 = 更新本目录内容后 docker compose restart。
      - /root/zen-agent/snapshot:/app/snapshot:ro
      # 运行数据（可写）：审计 events.jsonl + 会话 sessions/，容器重建不丢。
      - /root/zen-agent/data/za:/data/za
    restart: unless-stopped
