# 服务器侧版本化 compose（/root/zen-agent/releases/<deploy-id>/docker-compose.yml）。
# 端口只绑 127.0.0.1:9010——对外经 1panel 反代 https://agent.flash-api.com 进入，容器不直接暴露公网。
# secret 与环境参数全在同目录 .env（手工维护，不入仓）。
services:
  zen-agent:
    image: zen-agent-server:${ZA_IMAGE_TAG:-latest}
    ports:
      - '127.0.0.1:9010:8787'
    env_file:
      - /root/zen-agent/.env
    environment:
      ZA_SNAPSHOT_ROOT: /app/snapshot
      ZA_SYSTEM_PROMPT_PATH: /app/snapshot/system-prompt.md
      LARKSUITE_CLI_CONFIG_DIR: /data/lark-cli
    volumes:
      # 快照由 deploy-server.sh 以版本目录切换；禁止覆盖活动目录。
      - ${ZA_SNAPSHOT_HOST_DIR:-/root/zen-agent/snapshot}:/app/snapshot:ro
      # 运行数据（可写）：审计 events.jsonl + 会话 sessions/，容器重建不丢。
      - /root/zen-agent/data/za:/data/za
      # 飞书 profile/token 刷新状态：服务器受控目录，容器重建不丢。
      - ${ZA_LARK_CONFIG_HOST_DIR:-/root/zen-agent/lark-cli}:/data/lark-cli
    restart: unless-stopped
